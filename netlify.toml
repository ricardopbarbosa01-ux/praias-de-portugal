[build]
  command   = "npm run build"
  publish   = "dist"

# ── HTML: sem cache (garante atualizações imediatas)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── Service Worker: nunca em cache (deve ser sempre fresco)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── Imagens locais .jfif
[[headers]]
  for = "/images/*"
  [headers.values]
    Content-Type  = "image/jpeg"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*.jfif"
  [headers.values]
    Content-Type  = "image/jpeg"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jfif"
  [headers.values]
    Content-Type  = "image/jpeg"
    Cache-Control = "public, max-age=31536000, immutable"

# ── Assets estáticos: cache longa (CSS, JS, PNG, manifesto)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Headers de segurança para todos os recursos
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(self)"
